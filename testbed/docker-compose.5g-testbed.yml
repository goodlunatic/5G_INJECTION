services:
  5g_testbed:
    build:
      context: ..
      dockerfile: testbed/docker/Dockerfile.allinone
      args:
        UHD_VERSION: 4.8.0.0
    image: 5g_testbed/dev
    container_name: 5g_testbed
    restart: unless-stopped
    privileged: true
    stdin_open: true
    network_mode: host
    tty: true
    working_dir: /workspace
    ulimits:
      rtprio: 99
      memlock: -1
    volumes:
      - ..:/workspace
      - ../testbed/sources/open5gs:/opt/src/open5gs
      - ../testbed/sources/srsRAN_Project:/opt/src/srsRAN_Project
      - ../testbed/sources/srsRAN_4G:/opt/src/srsRAN_4G
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
      - /dev/net/tun:/dev/net/tun
      - testbed_mongodb:/var/lib/mongodb
    command:
      - /bin/bash
      - -lc
      - exec sleep infinity

volumes:
  testbed_mongodb:
