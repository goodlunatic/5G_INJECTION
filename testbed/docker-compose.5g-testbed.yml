services:
  mongodb:
    image: mongo:8.0
    container_name: testbed-mongodb
    restart: unless-stopped
    network_mode: host
    command: ["mongod", "--bind_ip", "127.0.0.1", "--port", "27018"]
    volumes:
      - testbed_mongodb:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27018", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  open5gs:
    build:
      context: ..
      dockerfile: testbed/docker/Dockerfile.open5gs
      args:
        OPEN5GS_TAG: v2.7.7
    image: 5g_testbed/open5gs-official
    container_name: testbed-open5gs
    restart: unless-stopped
    privileged: true
    network_mode: host
    working_dir: /workspace
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      OPEN5GS_CONFIG: /workspace/testbed/configs/open5gs/open5gs.yml
      SUBSCRIBER_ENV_FILE: /workspace/testbed/subscribers/test-ue.env
      OGSTUN_DEV: ogstun
      OGSTUN_IPV4_CIDR: 10.45.0.1/16
      OGSTUN_IPV6_CIDR: 2001:db8:cafe::1/48
      ENABLE_NAT: ${ENABLE_NAT:-false}
      WAN_IFACE: ${WAN_IFACE:-}
    volumes:
      - ..:/workspace
    command:
      - /bin/bash
      - /workspace/testbed/scripts/start-open5gs.sh

  srsran_gnb:
    build:
      context: ..
      dockerfile: testbed/docker/Dockerfile.srsran-gnb
      args:
        SRSRAN_PROJECT_TAG: release_24_10_1
        UHD_VERSION: 4.8.0.0
    image: 5g_testbed/srsran-gnb-official
    container_name: testbed-srsran-gnb
    restart: unless-stopped
    privileged: true
    network_mode: host
    working_dir: /workspace
    depends_on:
      open5gs:
        condition: service_started
    environment:
      GNB_CONFIG_TEMPLATE: /workspace/testbed/configs/srsran/gnb.yml.tpl
      GNB_CONFIG_RENDERED: /workspace/testbed/runtime/gnb.yml
      X310_ADDR: ${X310_ADDR:-192.168.40.2}
      X310_DEVICE_ARGS: ${X310_DEVICE_ARGS:-type=x300,addr=192.168.40.2,time_source=internal,master_clock_rate=184.32e6,num_recv_frames=64,num_send_frames=64}
      X310_CLOCK: ${X310_CLOCK:-external}
      X310_SYNC: ${X310_SYNC:-internal}
      GNB_TX_GAIN: ${GNB_TX_GAIN:-31.5}
      GNB_RX_GAIN: ${GNB_RX_GAIN:-31.5}
    volumes:
      - ..:/workspace
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
    command:
      - /bin/bash
      - /workspace/testbed/scripts/start-srsran-gnb.sh

  srsue_b210:
    build:
      context: ..
      dockerfile: testbed/docker/Dockerfile.srsue
      args:
        SRSRAN_4G_TAG: release_23_11
        UHD_VERSION: 4.8.0.0
    image: 5g_testbed/srsue-official
    container_name: testbed-srsue-b210
    restart: unless-stopped
    privileged: true
    network_mode: host
    working_dir: /workspace
    depends_on:
      srsran_gnb:
        condition: service_started
    environment:
      SRSUE_CONFIG_TEMPLATE: /workspace/testbed/configs/srsue/ue.conf.tpl
      SRSUE_CONFIG_RENDERED: /workspace/testbed/runtime/ue.conf
      SUBSCRIBER_ENV_FILE: /workspace/testbed/subscribers/test-ue.env
      B210_SERIAL: ${B210_SERIAL:-32DC32E}
      B210_CLOCK_SOURCE: ${B210_CLOCK_SOURCE:-external}
      B210_TIME_SOURCE: ${B210_TIME_SOURCE:-internal}
      B210_TX_GAIN: ${B210_TX_GAIN:-80}
      B210_RX_GAIN: ${B210_RX_GAIN:-20}
      UE_FREQ_OFFSET: ${UE_FREQ_OFFSET:-0}
      TIME_ADV_NSAMPLES: ${TIME_ADV_NSAMPLES:-100}
      B210_OTW_FORMAT: ${B210_OTW_FORMAT:-sc12}
      B210_NUM_RECV_FRAMES: ${B210_NUM_RECV_FRAMES:-256}
      B210_NUM_SEND_FRAMES: ${B210_NUM_SEND_FRAMES:-256}
      B210_RECV_FRAME_SIZE: ${B210_RECV_FRAME_SIZE:-8184}
      B210_SEND_FRAME_SIZE: ${B210_SEND_FRAME_SIZE:-8184}
      B210_EXTRA_DEVICE_ARGS: ${B210_EXTRA_DEVICE_ARGS:-}
      SRSUE_RTPRIO: ${SRSUE_RTPRIO:-20}
      SRSUE_CPUSET: ${SRSUE_CPUSET:-2-5}
    ulimits:
      rtprio: 99
      memlock: -1
    volumes:
      - ..:/workspace
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
      - /dev/net/tun:/dev/net/tun
    command:
      - /bin/bash
      - /workspace/testbed/scripts/start-srsue.sh

volumes:
  testbed_mongodb:
