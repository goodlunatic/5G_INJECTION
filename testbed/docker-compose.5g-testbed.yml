services:
  5g_testbed:
    build:
      context: ..
      dockerfile: testbed/docker/Dockerfile.allinone
      args:
        OPEN5GS_TAG: v2.7.7
        SRSRAN_PROJECT_TAG: release_24_10_1
        SRSRAN_4G_TAG: release_23_11
        UHD_VERSION: 4.8.0.0
    image: 5g_testbed/dev
    container_name: 5g_testbed
    restart: unless-stopped
    privileged: true
    stdin_open: true
    network_mode: host
    tty: true
    working_dir: /workspace
    ulimits:
      rtprio: 99
      memlock: -1
    volumes:
      - ..:/workspace
      - /dev:/dev
      - /dev/bus/usb:/dev/bus/usb
      - /dev/net/tun:/dev/net/tun
      - testbed_mongodb:/var/lib/mongodb
    command:
      - /bin/bash
      - -lc
      - exec sleep infinity

volumes:
  testbed_mongodb:
