cu_cp:
  amf:
    addr: 127.0.0.5
    port: 38412
    bind_addr: 127.0.0.1
    supported_tracking_areas:
      - tac: 1
        plmn_list:
          - plmn: "00101"
            tai_slice_support_list:
              - sst: 1

ru_sdr:
  device_driver: uhd
  device_args: type=x300,addr=192.168.40.2,time_source=internal,master_clock_rate=184.32e6,num_recv_frames=64,num_send_frames=64
  clock: external
  sync: internal
  srate: 23.04
  tx_gain: 25
  rx_gain: 25

cell_cfg:
  dl_arfcn: 368500
  band: 3
  channel_bandwidth_MHz: 20
  common_scs: 15
  plmn: "00101"
  tac: 1
  pci: 1
  pdcch:
    dedicated:
      ss2_type: common
      dci_format_0_1_and_1_1: false
    common:
      ss0_index: 0
      coreset0_index: 12
  prach:
    prach_config_index: 1

log:
  filename: /workspace/testbed/logs/srsran/gnb.log
  all_level: info

pcap:
  mac_enable: false
  mac_filename: /workspace/testbed/logs/srsran/gnb_mac.pcap
  ngap_enable: false
  ngap_filename: /workspace/testbed/logs/srsran/gnb_ngap.pcap
