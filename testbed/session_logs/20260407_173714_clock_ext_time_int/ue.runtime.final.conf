[rf]
device_name = UHD
device_args = type=b200,master_clock_rate=23.04e6,clock=external,otw_format=sc12,num_recv_frames=256,num_send_frames=256,recv_frame_size=8184,send_frame_size=8184,time_source=internal,serial=32DC32E
srate = 23.04e6
freq_offset = 0
tx_gain = 80
rx_gain = 20
time_adv_nsamples = 100
continuous_tx = yes

[rat.eutra]
nof_carriers = 0

[rat.nr]
bands = 3
nof_carriers = 1
dl_nr_arfcn = 368500
ssb_nr_arfcn = 368410
nof_prb = 106
max_nof_prb = 106
scs = 15

[pcap]
enable = none
mac_nr_filename = /workspace/testbed/logs/srsue/ue_mac_nr.pcap
nas_filename = /workspace/testbed/logs/srsue/ue_nas.pcap

[log]
all_level = info
phy_lib_level = warning
all_hex_limit = 32
filename = /workspace/testbed/logs/srsue/ue.log
file_max_size = -1

[usim]
mode = soft
algo = milenage
opc = 63BFA50EE6523365FF14C1F45F88737D
k = 00112233445566778899aabbccddeeff
imsi = 001010123456789
imei = 353490069873319

[nas]
apn = internet
apn_protocol = ipv4

[slicing]
enable = false

[gw]
ip_devname = tun_srsue
ip_netmask = 255.255.255.0

[gui]
enable = false
