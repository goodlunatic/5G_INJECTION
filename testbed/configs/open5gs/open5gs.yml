# This is the Open5GS configuration used by the testbed.
# It is intentionally trimmed for a small 5G SA lab: AMF/SMF/UPF plus the
# supporting 5GC control-plane functions needed by Open5GS.

db_uri: mongodb://127.0.0.1:27018/open5gs

logger:
  # All logs are written into the bind-mounted workspace for easy inspection.
  file:
    path: /workspace/testbed/logs/open5gs/open5gs.log
  level: info

global:
  max:
    ue: 64
  parameter:
    # Disable unused EPC / optional functions to keep the lab setup simple.
    no_scp: true
    no_sepp: true
    no_bsf: true
    no_mme: true
    no_sgwc: true
    no_sgwu: true
    no_pcrf: true
    no_hss: true

nrf:
  # NRF is still enabled because the 5GC NFs below register through SBI.
  serving:
    - plmn_id:
        mcc: 001
        mnc: 01
  sbi:
    server:
      - address: 127.0.0.10
        port: 7777

amf:
  sbi:
    server:
      - address: 127.0.0.5
        port: 7777
    client:
      nrf:
        - uri: http://127.0.0.10:7777
  ngap:
    server:
      - address: 127.0.0.5
  metrics:
    server:
      - address: 127.0.0.5
        port: 9090
  guami:
    # MCC/MNC/TAC/SST values here must stay aligned with gNB and UE configs.
    - plmn_id:
        mcc: 001
        mnc: 01
      amf_id:
        region: 2
        set: 1
  tai:
    - plmn_id:
        mcc: 001
        mnc: 01
      tac: 1
  plmn_support:
    - plmn_id:
        mcc: 001
        mnc: 01
      s_nssai:
        - sst: 1
  security:
    integrity_order: [ NIA2, NIA1, NIA0 ]
    ciphering_order: [ NEA0, NEA1, NEA2 ]
  network_name:
    full: Open5GS
    short: Open5GS
  amf_name: open5gs-amf0
  time:
    t3512:
      value: 540

smf:
  sbi:
    server:
      - address: 127.0.0.4
        port: 7777
    client:
      nrf:
        - uri: http://127.0.0.10:7777
  pfcp:
    server:
      - address: 127.0.0.4
    client:
      upf:
        - address: 127.0.0.7
  gtpc:
    server:
      - address: 127.0.0.4
  gtpu:
    server:
      - address: 127.0.0.4
  metrics:
    server:
      - address: 127.0.0.4
        port: 9090
  session:
    # DNN "internet" must match the UE APN and the subscriber record.
    - subnet: 10.45.0.0/16
      gateway: 10.45.0.1
      dnn: internet
  dns:
    - 8.8.8.8
    - 1.1.1.1
  mtu: 1400
  info:
    - s_nssai:
        - sst: 1
          dnn:
            - internet
      tai:
        - plmn_id:
            mcc: 001
            mnc: 01
          tac: 1

upf:
  pfcp:
    server:
      - address: 127.0.0.7
  gtpu:
    server:
      - address: 127.0.0.7
  session:
    # ogstun is created by the startup script and becomes the UE-side gateway.
    - subnet: 10.45.0.0/16
      gateway: 10.45.0.1
      dnn: internet
      dev: ogstun
  metrics:
    server:
      - address: 127.0.0.7
        port: 9090

ausf:
  sbi:
    server:
      - address: 127.0.0.11
        port: 7777
    client:
      nrf:
        - uri: http://127.0.0.10:7777

udm:
  hnet:
    - id: 1
      scheme: 1
      key: /opt/src/open5gs/build/configs/open5gs/hnet/curve25519-1.key
    - id: 2
      scheme: 2
      key: /opt/src/open5gs/build/configs/open5gs/hnet/secp256r1-2.key
  sbi:
    server:
      - address: 127.0.0.12
        port: 7777
    client:
      nrf:
        - uri: http://127.0.0.10:7777

udr:
  sbi:
    server:
      - address: 127.0.0.20
        port: 7777
    client:
      nrf:
        - uri: http://127.0.0.10:7777

pcf:
  sbi:
    server:
      - address: 127.0.0.13
        port: 7777
    client:
      nrf:
        - uri: http://127.0.0.10:7777
  metrics:
    server:
      - address: 127.0.0.13
        port: 9090

nssf:
  sbi:
    server:
      - address: 127.0.0.14
        port: 7777
    client:
      nrf:
        - uri: http://127.0.0.10:7777
      nsi:
        - uri: http://127.0.0.10:7777
          s_nssai:
            sst: 1
