# Test config for running the lab gNB on one B210 while Sni5Gect sniffs with a second B210.
# This keeps the original band 3 / 20 MHz / 15 kHz setup used for srsUE compatibility.

cu_cp:
  amf:
    addr: 10.53.1.2
    port: 38412
    bind_addr: 10.53.1.1
    supported_tracking_areas:
      - tac: 7
        plmn_list:
          - plmn: "00101"
            tai_slice_support_list:
              - sst: 1
  inactivity_timer: 7200

ru_sdr:
  device_driver: uhd
  device_args: type=b200,serial=32DC32E
  clock: external
  srate: 23.04
  tx_gain: 75
  rx_gain: 75

cell_cfg:
  dl_arfcn: 368500
  band: 3
  channel_bandwidth_MHz: 20
  common_scs: 15
  plmn: "00101"
  tac: 7
  pdcch:
    dedicated:
      ss2_type: common
      dci_format_0_1_and_1_1: false
    common:
      ss0_index: 0
      coreset0_index: 12
  prach:
    prach_config_index: 1
  pdsch:
    mcs_table: qam64
  pusch:
    mcs_table: qam64

log:
  filename: /tmp/gnb_sni5gect_test.log
  all_level: info

pcap:
  mac_enable: enable
  mac_filename: /tmp/gnb_sni5gect_test_mac.pcap
  ngap_enable: enable
  ngap_filename: /tmp/gnb_sni5gect_test_ngap.pcap
